<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --text: #f0f0f0;
    --muted: #555;
    --danger: #ff5f5f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container { width: 420px; padding: 0 16px; }

  .header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 40px; }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent);
  }
  .header-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* setup */
  .setup { transition: opacity 0.4s, transform 0.4s; }
  .setup.hidden { opacity: 0; pointer-events: none; transform: translateY(-8px); position: absolute; }

  .setup-label { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

  .time-inputs { display: flex; align-items: center; gap: 4px; margin-bottom: 24px; }

  .seg {
    width: 80px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 400; text-align: center; padding: 12px 0;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  .seg::-webkit-inner-spin-button, .seg::-webkit-outer-spin-button { display: none; }
  .seg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .seg-sep { font-size: 28px; color: var(--muted); padding: 0 2px; user-select: none; }

  .hint { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 28px; }
  .hint span { color: var(--accent); }

  .start-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 6px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .start-btn:hover { opacity: 0.88; }
  .start-btn:active { transform: scale(0.98); }

  /* timer */
  .timer { display: none; flex-direction: column; gap: 0; }
  .timer.visible { display: flex; }

  .current-clock { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 28px; font-variant-numeric: tabular-nums; }
  .current-clock span { color: var(--text); }

  .countdown-wrap { margin-bottom: 10px; }

  .countdown {
    font-family: 'Syne', sans-serif;
    font-size: 96px; font-weight: 800; letter-spacing: -4px; line-height: 1;
    color: var(--text); transition: color 0.3s;
    font-variant-numeric: tabular-nums;
  }
  .countdown.warning { color: var(--danger); }

  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s linear, background 0.3s; width: 100%; }
  .progress-bar.warning { background: var(--danger); }

  /* loop log */
  .loop-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 0 10px;
  }
  .loop-header-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .loop-count-badge {
    font-size: 11px; font-weight: 500;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 20px; padding: 2px 10px;
    font-variant-numeric: tabular-nums;
  }

  .loop-log {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    max-height: 130px; overflow-y: auto; padding: 8px 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .loop-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px; font-size: 12px; font-variant-numeric: tabular-nums;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .loop-item:not(:last-child) { border-bottom: 1px solid var(--border); }
  .loop-item-num { color: var(--muted); min-width: 36px; }
  .loop-item-range { color: var(--text); }
  .loop-item-status { font-size: 11px; color: var(--accent); }

  /* next alert */
  .next-row { font-size: 12px; color: var(--muted); margin: 14px 0 20px; letter-spacing: 0.05em; }
  .next-row span { color: var(--text); font-weight: 500; }

  /* controls */
  .controls { display: flex; gap: 10px; }
  .ctrl-btn {
    flex: 1; padding: 12px;
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.08em;
    cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* alert overlay */
  .alert-overlay {
    display: none; position: fixed; inset: 0;
    border: 2px solid var(--accent); pointer-events: none;
  }
  .alert-overlay.show { display: block; animation: flash 0.4s ease-in-out 3; }
  @keyframes flash { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-dot"></div>
    <div class="header-title">Interval Timer — Loop</div>
  </div>

  <!-- Setup -->
  <div class="setup" id="setup">
    <div class="setup-label">เวลาเริ่มต้น (รอบแรก)</div>
    <div class="time-inputs">
      <input class="seg" id="iH" type="number" min="0" max="23" placeholder="HH"/>
      <span class="seg-sep">:</span>
      <input class="seg" id="iM" type="number" min="0" max="59" placeholder="MM"/>
      <span class="seg-sep">:</span>
      <input class="seg" id="iS" type="number" min="0" max="59" placeholder="SS"/>
    </div>
    <div class="hint">เช่น <span>20:29:40</span> → แจ้งเตือน <span>20:34:40</span> → <span>20:39:40</span> → วนไปเรื่อยๆ</div>
    <button class="start-btn" onclick="startTimer()">เริ่มนับ →</button>
  </div>

  <!-- Timer -->
  <div class="timer" id="timer">
    <div class="current-clock">เวลาปัจจุบัน <span id="clockNow">--:--:--</span></div>

    <div class="countdown-wrap">
      <div class="countdown" id="countdown">05:00</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="next-row">แจ้งเตือนถัดไป <span id="nextAlert">--:--:--</span></div>

    <div class="loop-header">
      <div class="loop-header-label">ประวัติรอบ</div>
      <div class="loop-count-badge">รอบที่ <span id="loopNum">1</span></div>
    </div>
    <div class="loop-log" id="loopLog"></div>

    <div style="margin-top: 20px;">
      <div class="controls">
        <button class="ctrl-btn" onclick="goBack()">← ตั้งใหม่</button>
      </div>
    </div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay"></div>

<script>
  const TOTAL = 300;

  function pad(n) { return String(Math.floor(Math.abs(n))).padStart(2,'0'); }
  function fmtSec(s) { s = Math.max(0,s); return pad(s/60)+':'+pad(s%60); }
  function fmtHMS(d) { return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
  function addSec(d, s) { return new Date(d.getTime() + s*1000); }

  let firstStartMs = null;   // เวลาเริ่มต้นของรอบแรก (ms)
  let currentTargetMs = null; // เวลาแจ้งเตือนของรอบปัจจุบัน
  let currentStartMs = null;  // เวลาเริ่มต้นของรอบปัจจุบัน
  let loopIndex = 0;
  let iv = null;
  let alertedLoops = new Set();
  let logs = [];

  setInterval(() => {
    const el = document.getElementById('clockNow');
    if (el) el.textContent = fmtHMS(new Date());
  }, 500);

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[0,880],[0.18,1100],[0.36,880],[0.54,1320]].forEach(([t,freq]) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.35, ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.15);
        o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.16);
      });
    } catch(e){}
  }

  function doAlert(loopI, startD, endD) {
    if (alertedLoops.has(loopI)) return;
    alertedLoops.add(loopI);
    beep();

    // flash
    const ov = document.getElementById('alertOverlay');
    ov.classList.remove('show');
    void ov.offsetWidth;
    ov.classList.add('show');
    setTimeout(() => ov.classList.remove('show'), 1400);

    // add to log
    logs.unshift({ num: loopI, start: fmtHMS(startD), end: fmtHMS(endD) });
    renderLog();

    // advance to next loop
    loopIndex++;
    currentStartMs = currentTargetMs;
    currentTargetMs = currentStartMs + TOTAL * 1000;
    document.getElementById('loopNum').textContent = loopIndex + 1;
    updateNextAlert();
  }

  function renderLog() {
    const el = document.getElementById('loopLog');
    el.innerHTML = logs.map((l,i) => `
      <div class="loop-item">
        <span class="loop-item-num">#${l.num}</span>
        <span class="loop-item-range">${l.start} → ${l.end}</span>
        <span class="loop-item-status">✓ done</span>
      </div>
    `).join('');
  }

  function updateNextAlert() {
    if (!currentTargetMs) return;
    document.getElementById('nextAlert').textContent = fmtHMS(new Date(currentTargetMs));
  }

  function startTimer() {
    const h = parseInt(document.getElementById('iH').value);
    const m = parseInt(document.getElementById('iM').value);
    const s = parseInt(document.getElementById('iS').value);
    if (isNaN(h)||isNaN(m)||isNaN(s)) { alert('กรุณาใส่เวลาให้ครบ'); return; }

    const start = new Date();
    start.setHours(h, m, s, 0);

    firstStartMs = start.getTime();
    currentStartMs = firstStartMs;
    currentTargetMs = firstStartMs + TOTAL * 1000;
    loopIndex = 1;
    alertedLoops.clear();
    logs = [];

    document.getElementById('loopNum').textContent = 1;
    document.getElementById('loopLog').innerHTML = '';
    updateNextAlert();

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('timer').classList.add('visible');

    if (iv) clearInterval(iv);
    tick();
    iv = setInterval(tick, 500);
  }

  function tick() {
    const now = Date.now();

    // ยังไม่ถึงเวลาเริ่ม
    if (now < currentStartMs) {
      const wait = Math.ceil((currentStartMs - now) / 1000);
      document.getElementById('countdown').textContent = fmtSec(wait);
      document.getElementById('countdown').style.color = 'var(--muted)';
      document.getElementById('progressBar').style.width = '0%';
      return;
    }

    document.getElementById('countdown').style.color = '';

    const remaining = Math.ceil((currentTargetMs - now) / 1000);
    const elapsed = now - currentStartMs;
    const progress = Math.min(1, elapsed / (TOTAL * 1000));

    const cd = document.getElementById('countdown');
    const pb = document.getElementById('progressBar');

    if (remaining > 0) {
      cd.textContent = fmtSec(remaining);
      cd.classList.toggle('warning', remaining <= 30);
      pb.style.width = (progress * 100).toFixed(1) + '%';
      pb.classList.toggle('warning', remaining <= 30);
    } else {
      // ถึงเวลาแล้ว — trigger alert
      doAlert(loopIndex, new Date(currentStartMs), new Date(currentTargetMs));
    }
  }

  function goBack() {
    clearInterval(iv);
    firstStartMs = currentStartMs = currentTargetMs = null;
    loopIndex = 0; alertedLoops.clear(); logs = [];
    document.getElementById('timer').classList.remove('visible');
    document.getElementById('setup').classList.remove('hidden');
    ['iH','iM','iS'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('countdown').textContent = '05:00';
    document.getElementById('countdown').classList.remove('warning');
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('loopLog').innerHTML = '';
  }

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
</script>
</body>
</html>
